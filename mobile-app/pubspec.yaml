name: abu_bishar
description: "أبو بشار — متجر الأناقة. Ultra-fast shopping for Yemen."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  path_provider: 2.1.4

  # Routing
  go_router: ^14.2.7

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4+1
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  smooth_page_indicator: ^1.2.0
  confetti: ^0.7.0
  fluttertoast: ^8.2.8

  # Forms / validation
  flutter_form_builder: ^9.5.0
  form_builder_validators: ^11.0.0

  # Utils
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

  # PDF

  # QR
  qr_flutter: ^4.1.0

  # Firebase (push notifications, analytics) — optional

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1
  go_router_builder: ^2.7.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansArabic-ExtraBold.ttf
          weight: 900