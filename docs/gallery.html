<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معرض أبو بشار — كل المنتجات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0A0A0A; --ink-soft: #141414; --ink-card: #1A1A1A;
      --gold: #D4AF37; --gold-light: #E5C04B; --gold-dark: #947418;
      --muted: #A0AEC0; --white: #ffffff; --danger: #FF6B6B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: var(--ink); color: var(--white);
      min-height: 100vh;
    }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212,175,55,0.2);
      padding: 1rem 0;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: var(--white);
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: var(--ink); font-size: 18px;
    }
    .logo-text { font-weight: 900; font-size: 1.25rem; }
    .logo-text .gold { color: var(--gold); }
    
    .search {
      flex: 1; max-width: 500px;
      position: relative;
    }
    .search input {
      width: 100%; padding: 12px 20px 12px 48px;
      background: var(--ink-soft);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      color: var(--white);
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    .search input:focus { border-color: var(--gold); }
    .search .icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--gold); font-size: 18px;
    }
    
    .stats {
      display: flex; gap: 1rem; align-items: center;
    }
    .stat-pill {
      background: var(--ink-card);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-pill .num { color: var(--gold); font-weight: 900; }
    
    .filters {
      max-width: 1400px; margin: 0 auto;
      padding: 1.5rem;
      display: flex; gap: 0.75rem; flex-wrap: wrap;
    }
    .filter {
      padding: 8px 16px;
      background: var(--ink-card);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 100px;
      color: var(--white);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter:hover { border-color: var(--gold); }
    .filter.active {
      background: var(--gold);
      color: var(--ink);
      border-color: var(--gold);
    }
    
    .main {
      max-width: 1400px; margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .search { display: none; }
    }
    
    .card {
      background: var(--ink-card);
      border: 1px solid rgba(212,175,55,0.1);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(212,175,55,0.5);
    }
    .card-img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      background: var(--ink-soft);
    }
    .card-body { padding: 1rem; }
    .card-cat {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
      text-transform: uppercase;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      margin: 0.25rem 0 0.5rem;
      color: var(--white);
      line-height: 1.3;
      min-height: 2.6em;
    }
    .card-price {
      display: flex; align-items: center; gap: 6px;
      font-size: 17px;
      font-weight: 900;
      color: var(--gold);
    }
    
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--ink-card);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty .icon { font-size: 4rem; opacity: 0.5; margin-bottom: 1rem; }
    .empty a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 12px 24px;
      background: var(--gold);
      color: var(--ink);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
    }
    
    .footer {
      max-width: 1400px; margin: 0 auto;
      padding: 2rem 1.5rem;
      border-top: 1px solid rgba(212,175,55,0.2);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .footer a { color: var(--gold); text-decoration: none; }
    
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 2rem;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--ink-card);
      border: 1px solid var(--gold);
      border-radius: 20px;
      max-width: 500px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 12px; left: 12px;
      width: 36px; height: 36px;
      background: var(--ink-soft);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 50%;
      color: var(--white);
      cursor: pointer;
      font-size: 18px;
    }
    .modal-img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
    }
    .modal-body { padding: 1.5rem; }
    .modal-body h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .modal-body .price {
      font-size: 1.75rem; font-weight: 900;
      color: var(--gold); margin: 0.5rem 0;
    }
    .modal-body .desc { color: var(--muted); line-height: 1.6; }
    .modal-body .specs {
      margin: 1rem 0; padding: 1rem;
      background: var(--ink-soft);
      border-radius: 12px;
    }
    .modal-body .specs div {
      display: flex; justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(212,175,55,0.1);
    }
    .modal-body .specs div:last-child { border: 0; }
    .modal-body .specs span:first-child { color: var(--muted); }
    .modal-body .add-cart {

      color: var(--ink);
      border: 0;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 1rem;
      font-family: inherit;
    }
    
    .cta-banner {
      background: linear-gradient(135deg, var(--ink-soft) 0%, var(--ink-card) 100%);

      border-radius: 16px;

    .cta-banner h3 { color: var(--gold); font-size: 1.25rem; margin-bottom: 0.5rem; }
    .cta-banner p { color: var(--muted); font-size: 14px; }
    .cta-banner .btn {
      padding: 12px 24px;
      background: var(--gold);
      color: var(--ink);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>

    // === DATABASE (IndexedDB) ===
    const DB_NAME = 'AbuBisharDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'products';
    let db = null;
    
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            store.createIndex('cat', 'cat', { unique: false });
            store.createIndex('name', 'name', { unique: false });
          }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = (e) => reject(e);
      });
    }
    
    function getAllProducts() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = (e) => reject(e);
      });
    }
    
    function addProduct(p) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(p);
        tx.oncomplete = () => resolve();
        tx.onerror = (e) => reject(e);
      });
    }

    // === CATALOG GENERATION ===
    function generateCatalogFromBase() {
      const products = [];
      const SIZES = ['S', 'M', 'L', 'XL', 'XXL', '38', '39', '40', '41', '42', '43', '44', '45'];
      const COLORS = ['أسود', 'أبيض', 'كحلي', 'رمادي', 'بني', 'بيج', 'ذهبي'];
      const BRANDS = ['أبو بشار', 'LUXURY', 'PREMIUM', 'CLASSIC', 'ROYAL', 'ELITE'];
      
      let id = 1;
      BASE_PRODUCTS.forEach(base => {
        const variants = Math.ceil(10000 / BASE_PRODUCTS.length);
        for (let i = 0; i < variants; i++) {
          const priceVar = 0.7 + Math.random() * 0.6;
          products.push({
            id: 'ABV-' + String(id).padStart(6, '0'),
            name: base.name,
            cat: base.cat,
            img: base.img,
            size: SIZES[Math.floor(Math.random() * SIZES.length)],
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            brand: BRANDS[Math.floor(Math.random() * BRANDS.length)],
            desc: 'قطعة فاخرة مصنوعة من أجود الخامات.',
            price: Math.round(base.basePrice * priceVar),
            isGenerated: true,
          });
          id++;
        }
      });
      return products;
    }
    
    // === UI ===
    const grid = document.getElementById('grid');
    const filtersEl = document.getElementById('filters');
    const searchInput = document.getElementById('searchInput');
    const ctaBanner = document.getElementById('ctaBanner');
    
    let ALL_PRODUCTS = [];
    let currentFilter = 'الكل';
    let currentSearch = '';
    let renderedCount = 0;
    const PAGE_SIZE = 50;
    let currentFiltered = [];
    
    function renderCard(p) {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <div style="position: relative;">
          <img class="card-img" loading="lazy" src="${p.img}" alt="${p.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect fill=%22%231A1A1A%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23D4AF37%22 font-size=%2240%22>${p.cat || '?'}</text></svg>'">
        </div>
        <div class="card-body">
          <div class="card-cat">${p.cat || 'غير مصنف'} • ${p.brand || 'أبو بشار'}</div>
          <div class="card-name">${p.name || 'بدون اسم'}</div>
          <div class="card-price">${(p.price || 0).toLocaleString('ar-EG')} ر.ي</div>
        </div>
      `;
      div.onclick = () => openModal(p);
      return div;
    }
    
    function renderPage() {
      let list = ALL_PRODUCTS;
      if (currentFilter !== 'الكل') {
        list = list.filter(p => p.cat === currentFilter);
      }
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        list = list.filter(p => 
          (p.name || '').toLowerCase().includes(q) || 
          (p.cat || '').toLowerCase().includes(q) || 
          (p.id || '').toLowerCase().includes(q) ||
          (p.brand || '').toLowerCase().includes(q)
        );
      }
      currentFiltered = list;
      renderedCount = 0;
      grid.innerHTML = '';
      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <div class="icon">📦</div>
            <h3>لا توجد منتجات</h3>
            <p>ارفع منتجاتك في لوحة الإدارة أو ابحث بكلمة أخرى</p>
            <a href="admin.html">📤 ارفع منتجاتك</a>
          </div>
        `;
        document.getElementById('visibleCount').textContent = '0';
        return;
      }
      loadMore();
    }
    
    function loadMore() {
      const end = Math.min(renderedCount + PAGE_SIZE, currentFiltered.length);
      const frag = document.createDocumentFragment();
      for (let i = renderedCount; i < end; i++) {
        frag.appendChild(renderCard(currentFiltered[i]));
      }
      grid.appendChild(frag);
      renderedCount = end;
      document.getElementById('visibleCount').textContent = renderedCount.toLocaleString('ar-EG');
    }
    
    // Infinite scroll
    window.addEventListener('scroll', () => {
      if (renderedCount >= currentFiltered.length) return;
      const scrollPos = window.scrollY + window.innerHeight;
      const threshold = document.body.scrollHeight - 1000;
      if (scrollPos > threshold) loadMore();
    });
    
    // Search
    searchInput.addEventListener('input', e => {
      currentSearch = e.target.value;
      renderPage();
    });
    
    // Modal
    function openModal(p) {
      document.getElementById('modalImg').src = p.img;
      document.getElementById('modalCat').textContent = (p.cat || '') + ' • ' + (p.brand || '');
      document.getElementById('modalName').textContent = p.name || 'منتج';
      document.getElementById('modalPrice').textContent = (p.price || 0).toLocaleString('ar-EG') + ' ر.ي';
      document.getElementById('modalDesc').textContent = p.desc || 'منتج فاخر من أبو بشار';
      document.getElementById('modalSize').textContent = p.size || '-';
      document.getElementById('modalColor').textContent = p.color || '-';
      document.getElementById('modalBrand').textContent = p.brand || 'أبو بشار';
      document.getElementById('modalSku').textContent = p.id || '-';
      document.getElementById('modal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
    document.getElementById('modal').onclick = e => {
      if (e.target.id === 'modal') closeModal();
    };
    
    // === INIT ===
    (async () => {
      try {
        await openDB();
        const dbProducts = await getAllProducts();
        if (dbProducts.length > 0) {
          ALL_PRODUCTS = dbProducts;
          ctaBanner.style.display = 'none';
        } else {
          // Fall back to generated catalog from base products
          ALL_PRODUCTS = generateCatalogFromBase();
        }
      } catch (e) {
        console.error('DB error, using generated catalog', e);
        ALL_PRODUCTS = generateCatalogFromBase();
      }
      
      // Build filters
      const cats = ['الكل', ...new Set(ALL_PRODUCTS.map(p => p.cat).filter(Boolean))];
      cats.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.className = 'filter' + (idx === 0 ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
          document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = cat;
          renderPage();
        };
        filtersEl.appendChild(btn);
      });
      
      renderPage();
    })();
  </script>
</body>
</html>
