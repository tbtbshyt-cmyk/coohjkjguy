name: Flutter Build (APK + AAB)

on:
  push:
    branches: [main]
    paths: [ 'mobile-app/**', '.github/workflows/**' ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.3'

jobs:
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ./mobile-app
        run: flutter pub get

      - name: Generate code (freezed/json/hive)
        working-directory: ./mobile-app
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Build APK (split per ABI)
        working-directory: ./mobile-app
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE_URL=https://api.abu-bishar.com/api/v1/abecp \
            --dart-define=CDN_URL=https://cdn.abu-bishar.com

      - name: Build universal APK
        working-directory: ./mobile-app
        run: flutter build apk --release

      - name: Build AAB (Play Store)
        working-directory: ./mobile-app
        run: flutter build appbundle --release

      - name: List build outputs
        working-directory: ./mobile-app
        run: |
          echo "=== APKs ===" && ls -lh build/app/outputs/flutter-apk/*.apk 2>/dev/null
          echo "=== AAB ===" && ls -lh build/app/outputs/bundle/release/*.aab 2>/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            mobile-app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            mobile-app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            mobile-app/build/app/outputs/flutter-apk/app-release.apk
            mobile-app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
