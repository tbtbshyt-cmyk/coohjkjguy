name: Flutter Build (APK + AAB)

on:
  push:
    branches: [main]
    paths: [ 'mobile-app/**', '.github/workflows/**' ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.3'

jobs:
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Generate debug keystore (for unsigned release builds)
        run: |
          mkdir -p $HOME/.android
          if [ ! -f $HOME/.android/debug.keystore ]; then
            keytool -genkey -v -keystore $HOME/.android/debug.keystore               -storepass android -alias androiddebugkey -keypass android               -keyalg RSA -keysize 2048 -validity 10000               -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Install dependencies
        working-directory: ./mobile-app
        run: flutter pub get
      - name: Build universal APK
        working-directory: ./mobile-app
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://api.abu-bishar.com/api/v1/abecp \
            --dart-define=CDN_URL=https://cdn.abu-bishar.com
      - name: Build AAB (Play Store)
        working-directory: ./mobile-app
        run: flutter build appbundle --release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            mobile-app/build/app/outputs/flutter-apk/app-release.apk
            mobile-app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
