name: Deploy Backend

on:
  push:
    branches: [main]
    paths: [ 'admin-dashboard/api/**', '.github/workflows/**' ]
  workflow_dispatch:

jobs:
  test-build:
    name: Build + Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install
        working-directory: ./admin-dashboard/api
        run: npm ci
      - name: Build
        working-directory: ./admin-dashboard/api
        run: npm run build
      - name: Upload Docker image
        run: echo "Backend build artifact ready"
