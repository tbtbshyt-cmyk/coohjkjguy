name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'admin-dashboard/api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: ./admin-dashboard/api
        run: npm ci
      - name: Lint
        working-directory: ./admin-dashboard/api
        run: npm run lint || true
      - name: Test
        working-directory: ./admin-dashboard/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: npm test -- --passWithNoTests || true

  deploy:
    name: Deploy to Render
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}" || true
      - name: Wait + smoke test
        run: |
          sleep 45
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://api.abu-bishar.com/api/v1/abecp/health || echo 000)
          echo "Backend health: $STATUS"
