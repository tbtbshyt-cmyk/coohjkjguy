name: Build Web

on:
  push:
    branches: [main]
    paths: [ 'web-frontend/**', '.github/workflows/**' ]
  workflow_dispatch:

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install
        working-directory: ./web-frontend
        run: npm ci
      - name: Build
        working-directory: ./web-frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.abu-bishar.com
          NEXT_PUBLIC_CDN_URL: https://cdn.abu-bishar.com
        run: npm run build
      - name: Upload .next
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-frontend/out
          retention-days: 7
